<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Flames Report AI</title>

    <link rel="stylesheet" href="../css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="left-panel">

        <div class="brand">

            🔥 Flames Report AI

        </div>

        <h1>

            Welcome Back

        </h1>

        <p>

            Continue creating professional reports with AI.

        </p>

    </div>

    <div class="right-panel">

        <form id="loginForm">

            <h2>Login</h2>

            <div class="input-group">

                <label>Email</label>

                <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                type="password"
                id="password"
                placeholder="Enter password"
                required>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <button type="submit">

                Login

            </button>

            <p class="bottom-text">

                Don't have an account?

                <a href="signup.html">

                    Sign Up

                </a>

            </p>

        </form>

    </div>

</div>

<script src="../js/auth.js"></script>

</body>

</html>
