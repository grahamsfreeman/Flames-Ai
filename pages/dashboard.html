<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Flames Report AI</title>

    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            🔥 Flames Report AI

        </div>

        <ul>

            <li class="active">
                <i class="fas fa-home"></i>
                Dashboard
            </li>

            <li>
                <i class="fas fa-file-alt"></i>
                Reports
            </li>

            <li>
                <i class="fas fa-plus-circle"></i>
                New Report
            </li>

            <li>
                <i class="fas fa-folder-open"></i>
                My Files
            </li>

            <li>
                <i class="fas fa-robot"></i>
                AI Assistant
            </li>

            <li>
                <i class="fas fa-history"></i>
                History
            </li>

            <li>
                <i class="fas fa-cog"></i>
                Settings
            </li>

            <li>
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <header class="topbar">

            <h1>Welcome Back 👋</h1>

            <button class="new-report">

                + New Report

            </button>

        </header>

        <!-- Statistics -->

        <section class="stats">

            <div class="card">

                <h2>Reports</h2>

                <h3>0</h3>

            </div>

            <div class="card">

                <h2>Files</h2>

                <h3>0</h3>

            </div>

            <div class="card">

                <h2>AI Usage</h2>

                <h3>0%</h3>

            </div>

            <div class="card">

                <h2>Storage</h2>

                <h3>0 MB</h3>

            </div>

        </section>

        <!-- Recent Reports -->

        <section class="recent">

            <h2>Recent Reports</h2>

            <div class="empty">

                <i class="fas fa-folder-open"></i>

                <p>No reports yet.</p>

                <button>Create Your First Report</button>

            </div>

        </section>

    </main>

</div>

<script src="../js/dashboard.js"></script>

</body>

  </html>
