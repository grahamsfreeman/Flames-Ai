<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Report Studio | Flames Report AI</title>

<link rel="stylesheet"
href="../css/report.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="studio">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>🔥 Flames AI</h2>

        <button class="generate-btn">

            Generate Report

        </button>

        <ul>

            <li><i class="fas fa-book"></i> Templates</li>

            <li><i class="fas fa-folder"></i> Files</li>

            <li><i class="fas fa-microphone"></i> Voice</li>

            <li><i class="fas fa-comments"></i> AI Chat</li>

            <li><i class="fas fa-chart-bar"></i> Charts</li>

            <li><i class="fas fa-table"></i> Tables</li>

            <li><i class="fas fa-cog"></i> Formatting</li>

            <li><i class="fas fa-bookmark"></i> References</li>

        </ul>

    </aside>

    <!-- Editor -->

    <main class="editor">

        <input
        type="text"
        class="title"
        placeholder="Report Title">

        <textarea
        class="workspace"
        placeholder="Start typing your report here..."></textarea>

    </main>

    <!-- Preview -->

    <aside class="preview">

        <h3>Live Preview</h3>

        <div class="paper">

            <h2>Untitled Report</h2>

            <p>

                Your formatted report preview will appear here.

            </p>

        </div>

    </aside>

</div>

<script src="../js/report.js"></script>

</body>

</html>
